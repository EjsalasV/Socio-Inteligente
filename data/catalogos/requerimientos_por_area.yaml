version: 1
descripcion: "Guía de requerimientos por área y aseveración"

areas:

  "140":
    nombre: "Efectivo y Equivalentes"
    aseveraciones:
      existencia:
        documentos:
          - "Conciliaciones bancarias al cierre del período"
          - "Extractos bancarios originales"
          - "Arqueos de caja (si aplica)"
        preguntas:
          - "¿Cuántas cuentas bancarias tiene la empresa?"
          - "¿Existe efectivo en caja chica? ¿Cuánto?"
          - "¿Se realizan conciliaciones bancarias mensuales?"
        procedimientos:
          - "Conciliar saldo contable vs extracto bancario"
          - "Verificar partidas conciliatorias abiertas"
      integridad:
        documentos:
          - "Detalle de movimientos bancarios del período"
          - "Registros de ingresos y egresos de caja"
        preguntas:
          - "¿Existen cuentas bancarias no registradas?"
          - "¿Hay movimientos en efectivo no contabilizados?"
        procedimientos:
          - "Revisar movimientos inusuales o de alto monto"

  "130.1":
    nombre: "Cuentas por Cobrar Corrientes"
    aseveraciones:
      existencia:
        documentos:
          - "Detalle de cuentas por cobrar por cliente"
          - "Facturas de venta pendientes de cobro"
          - "Confirmaciones de saldo con clientes principales"
        preguntas:
          - "¿Cuáles son los 5 clientes principales?"
          - "¿Existen saldos con partes relacionadas en cartera?"
          - "¿Se han realizado circulares de confirmación?"
        procedimientos:
          - "Circular de confirmación a clientes significativos"
          - "Revisar cobranzas posteriores al cierre"
      valuacion:
        documentos:
          - "Análisis de antigüedad de cartera"
          - "Política de provisión de cuentas incobrables"
          - "Detalle de cuentas castigadas en el período"
        preguntas:
          - "¿Cuál es la política de provisión de cartera?"
          - "¿Existen clientes en proceso de cobro legal?"
          - "¿Qué porcentaje de cartera supera 90 días?"
        procedimientos:
          - "Verificar razonabilidad de provisión vs antigüedad"
          - "Revisar cuentas con más de 180 días"
      derechos:
        documentos:
          - "Contratos de venta o servicios con clientes"
          - "Cesiones o garantías sobre cartera (si aplica)"
        preguntas:
          - "¿Existe cartera cedida como garantía?"
          - "¿Hay factoring o descuento de cartera?"
        procedimientos:
          - "Verificar que la cartera no esté cedida sin revelar"

  "110":
    nombre: "Inventarios"
    aseveraciones:
      existencia:
        documentos:
          - "Acta de toma física de inventarios"
          - "Conteos físicos al cierre del período"
          - "Kardex o sistema de control de inventarios"
        preguntas:
          - "¿Cuándo fue el último conteo físico?"
          - "¿Se permitirá la observación del inventario?"
          - "¿Existe inventario en consignación o en tránsito?"
        procedimientos:
          - "Observación de toma física de inventarios"
          - "Verificar conteos con registros del sistema"
      valuacion:
        documentos:
          - "Política de costeo (FIFO, promedio ponderado)"
          - "Listado de ítems obsoletos o de lenta rotación"
          - "Facturas de compra de últimos lotes"
        preguntas:
          - "¿Cuál es el método de costeo utilizado?"
          - "¿Existen productos obsoletos o dañados?"
          - "¿El costo de reposición es mayor al costo registrado?"
        procedimientos:
          - "Verificar cálculo de costo unitario"
          - "Revisar mercadería obsoleta y su provisión"

  "14":
    nombre: "Inversiones No Corrientes"
    aseveraciones:
      existencia:
        documentos:
          - "Detalle de inversiones mantenidas al cierre"
          - "Escrituras o contratos de inversión"
          - "Certificados de participación accionaria"
        preguntas:
          - "¿En qué entidades tiene inversiones la empresa?"
          - "¿Cuál es el porcentaje de participación en cada una?"
          - "¿Se han recibido estados financieros de las participadas?"
        procedimientos:
          - "Verificar título o certificado de inversión"
          - "Solicitar estados financieros de participadas"
      valuacion:
        documentos:
          - "Estados financieros de empresas participadas"
          - "Cálculo del Valor Patrimonial Proporcional (VPP)"
          - "Actas que soporten dividendos recibidos"
        preguntas:
          - "¿Se aplica el método VPP o costo?"
          - "¿Las participadas han generado utilidad o pérdida?"
          - "¿Existen indicios de deterioro de las inversiones?"
        procedimientos:
          - "Recalcular VPP con estados financieros de participada"
          - "Evaluar deterioro de la inversión"

  "200":
    nombre: "Patrimonio"
    aseveraciones:
      integridad:
        documentos:
          - "Acta de junta de accionistas del período"
          - "Libro de acciones o registro de socios"
          - "Escritura de constitución y reformas estatutarias"
          - "Acta de distribución de dividendos (si aplica)"
        preguntas:
          - "¿Hubo cambios en el capital durante el período?"
          - "¿Se distribuyeron dividendos o utilidades?"
          - "¿Existieron aportes de capital no dinerarios?"
        procedimientos:
          - "Conciliar capital contable vs libro de acciones"
          - "Verificar legalidad de movimientos patrimoniales"
      presentacion:
        documentos:
          - "Detalle de reservas y su origen"
          - "Conciliación de resultados acumulados"
        preguntas:
          - "¿Las reservas cumplen con requisitos legales?"
          - "¿Los resultados acumulados concilian con períodos anteriores?"
        procedimientos:
          - "Verificar presentación de componentes patrimoniales"

  "425":
    nombre: "Cuentas por Pagar"
    aseveraciones:
      integridad:
        documentos:
          - "Detalle de cuentas por pagar por proveedor"
          - "Facturas pendientes de pago al cierre"
          - "Estado de cuenta de proveedores principales"
        preguntas:
          - "¿Existen obligaciones no registradas al cierre?"
          - "¿Se han recibido facturas después del cierre por compras anteriores?"
          - "¿Hay notas de débito pendientes de contabilizar?"
        procedimientos:
          - "Prueba de corte de compras"
          - "Circular de confirmación a proveedores principales"
      valuacion:
        documentos:
          - "Conciliación de saldos con proveedores"
          - "Detalle de anticipos recibidos de clientes"
        preguntas:
          - "¿Existen saldos con partes relacionadas?"
          - "¿Hay pasivos en moneda extranjera no ajustados?"
        procedimientos:
          - "Verificar tipo de cambio en saldos en divisas"

  "1500":
    nombre: "Ingresos"
    aseveraciones:
      ocurrencia:
        documentos:
          - "Facturas de venta del período"
          - "Contratos con clientes principales"
          - "Reportes de despacho o entrega de servicio"
        preguntas:
          - "¿Cuándo se considera devengado el ingreso?"
          - "¿Existen ventas a partes relacionadas?"
          - "¿Hay ingresos diferidos al cierre?"
        procedimientos:
          - "Prueba de detalle sobre ventas significativas"
          - "Verificar que el ingreso corresponde al período"
      corte:
        documentos:
          - "Últimas 20 facturas del año y primeras 20 del año siguiente"
          - "Remisiones o actas de entrega de diciembre"
        preguntas:
          - "¿Cuál es la fecha de la última factura del año?"
          - "¿Existen ventas registradas antes de la entrega?"
        procedimientos:
          - "Prueba de corte de ventas (cutoff test)"

  "1600":
    nombre: "Gastos Administrativos"
    aseveraciones:
      integridad:
        documentos:
          - "Detalle de gastos por naturaleza"
          - "Roles de pago del período"
          - "Facturas de gastos significativos"
        preguntas:
          - "¿Existen gastos no deducibles significativos?"
          - "¿Se realizaron pagos a partes relacionadas?"
          - "¿Hay gastos del período no contabilizados?"
        procedimientos:
          - "Análisis comparativo de gastos vs período anterior"
          - "Verificar soporte de gastos sobre umbral"
      valuacion:
        documentos:
          - "Conciliación tributaria (gastos deducibles vs no deducibles)"
          - "Detalle de depreciaciones y amortizaciones"
        preguntas:
          - "¿Cómo se determinó la vida útil de los activos?"
          - "¿Existen activos totalmente depreciados en uso?"
        procedimientos:
          - "Recalcular depreciación de muestra de activos"

  "136":
    nombre: "Activos por Impuestos Corrientes"
    aseveraciones:
      existencia:
        documentos:
          - "Formulario 104 (IVA) de los últimos 12 meses"
          - "Formulario 103 (Retenciones en la fuente)"
          - "Crédito tributario de IVA (si aplica)"
        preguntas:
          - "¿El crédito tributario es recuperable o compensable?"
          - "¿Existen impuestos en disputa con el SRI?"
          - "¿Se han solicitado devoluciones de impuestos?"
        procedimientos:
          - "Conciliar saldo contable vs declaraciones SRI"
          - "Verificar aplicación de retenciones recibidas"

  "15":
    nombre: "Activos por Impuestos Diferidos"
    aseveraciones:
      valuacion:
        documentos:
          - "Conciliación tributaria del período"
          - "Cálculo de diferencias temporarias"
          - "Proyección de utilidades futuras (para justificar AID)"
        preguntas:
          - "¿Existe expectativa razonable de utilidades futuras?"
          - "¿Cuáles son las principales diferencias temporarias?"
          - "¿Se ha revisado el AID con un experto tributario?"
        procedimientos:
          - "Verificar cálculo de diferencias temporarias"
          - "Evaluar recuperabilidad del activo diferido"

  "1":
    nombre: "Propiedad Planta y Equipo"
    aseveraciones:
      existencia:
        documentos:
          - "Detalle de activos fijos por categoría (muebles, equipos, vehículos, edificios)"
          - "Actas de baja o disposición de activos durante el período"
          - "Pólizas de seguro vigentes sobre activos significativos"
          - "Escrituras de inmuebles o títulos de propiedad"
        preguntas:
          - "¿Se realizó un inventario físico de activos fijos en el período?"
          - "¿Existen activos totalmente depreciados que aún se usan?"
          - "¿Hubo adquisiciones o bajas significativas en el período?"
          - "¿Existen activos en leasing o arrendamiento financiero?"
        procedimientos:
          - "Inspección física de activos significativos"
          - "Conciliar detalle de activos vs saldo contable"
          - "Verificar cálculo de depreciación por categoría"
          - "Revisar adquisiciones del período y su soporte"
      valuacion:
        documentos:
          - "Tabla de depreciación actualizada al cierre"
          - "Política contable de vida útil por categoría"
          - "Avalúos técnicos (si se usa modelo de revaluación)"
          - "Facturas de adquisición de activos del período"
        preguntas:
          - "¿Cuál es el método de depreciación utilizado?"
          - "¿Se revisaron las vidas útiles en el período?"
          - "¿Existen indicios de deterioro en algún activo?"
          - "¿Se aplica modelo de costo o de revaluación?"
        procedimientos:
          - "Recalcular depreciación de muestra de activos"
          - "Evaluar indicios de deterioro (NIC 36 / Sección 17)"
          - "Verificar consistencia de vidas útiles con política"
      derechos:
        documentos:
          - "Contratos de arrendamiento o leasing vigentes"
          - "Certificados de gravámenes sobre inmuebles"
        preguntas:
          - "¿Existen activos prendados como garantía?"
          - "¿Hay activos de terceros registrados como propios?"
        procedimientos:
          - "Verificar que los activos registrados son de propiedad de la empresa"
          - "Revisar revelación de activos dados en garantía"

  "410":
    nombre: "Obligaciones por Beneficios a Empleados"
    aseveraciones:
      integridad:
        documentos:
          - "Roles de pago de los últimos 3 meses del período"
          - "Planilla del IESS (aportaciones patronales y personales)"
          - "Cálculo de provisiones: décimos, vacaciones, fondos de reserva"
          - "Detalle de liquidaciones de haberes pagadas en el período"
        preguntas:
          - "¿Cuántos empleados tiene la empresa al cierre?"
          - "¿Existen empleados con contrato de plazo fijo próximo a vencer?"
          - "¿Se han pagado todos los beneficios sociales del período?"
          - "¿Hay empleados con vacaciones acumuladas sin pagar?"
        procedimientos:
          - "Recalcular provisión de vacaciones por empleado"
          - "Verificar aportaciones al IESS vs planilla"
          - "Conciliar saldo contable de beneficios vs cálculo actuarial"
      valuacion:
        documentos:
          - "Cálculo actuarial de jubilación patronal (si aplica)"
          - "Política de reconocimiento de beneficios post-empleo"
        preguntas:
          - "¿La empresa tiene obligación de jubilación patronal?"
          - "¿Se contrató un actuario para el cálculo?"
          - "¿Cuántos empleados tienen más de 10 años en la empresa?"
        procedimientos:
          - "Verificar razonabilidad del cálculo actuarial"
          - "Revisar hipótesis utilizadas: tasa de descuento, rotación"

  "300.1":
    nombre: "Préstamos Corrientes"
    aseveraciones:
      integridad:
        documentos:
          - "Contratos de préstamo vigentes con instituciones financieras"
          - "Tablas de amortización actualizadas al cierre"
          - "Estados de cuenta de préstamos al cierre del período"
          - "Certificados de saldo emitidos por las entidades financieras"
        preguntas:
          - "¿Cuántos préstamos bancarios tiene la empresa vigentes?"
          - "¿Existen cláusulas de incumplimiento (covenants) en los contratos?"
          - "¿Se han cumplido todas las cuotas del período?"
          - "¿Hay préstamos con partes relacionadas?"
        procedimientos:
          - "Conciliar saldo contable vs tabla de amortización"
          - "Verificar clasificación corriente vs no corriente"
          - "Confirmar saldo con institución financiera"
      valuacion:
        documentos:
          - "Cálculo de intereses devengados al cierre"
          - "Detalle de garantías otorgadas sobre préstamos"
        preguntas:
          - "¿Se han reconocido los intereses devengados al cierre?"
          - "¿Existen préstamos en moneda extranjera?"
        procedimientos:
          - "Recalcular intereses devengados no pagados"
          - "Verificar tipo de cambio en préstamos en divisas"

  "300.2":
    nombre: "Préstamos No Corrientes"
    aseveraciones:
      integridad:
        documentos:
          - "Contratos de préstamo a largo plazo vigentes"
          - "Tablas de amortización con detalle de porción no corriente"
          - "Certificados de saldo de largo plazo al cierre"
        preguntas:
          - "¿Cuál es el vencimiento de cada préstamo a largo plazo?"
          - "¿Existe riesgo de reclasificación a corriente por incumplimiento?"
          - "¿Se han refinanciado préstamos en el período?"
        procedimientos:
          - "Verificar correcta separación porción corriente vs no corriente"
          - "Revisar cláusulas de vencimiento anticipado"
          - "Confirmar saldo con institución financiera"
      valuacion:
        documentos:
          - "Análisis de tasas de interés efectivas vs nominales"
          - "Detalle de costos de transacción capitalizados"
        preguntas:
          - "¿Se aplica tasa de interés efectiva o nominal?"
          - "¿Existen comisiones o costos de estructuración capitalizados?"
        procedimientos:
          - "Verificar aplicación de tasa de interés efectiva (NIIF)"
          - "Revisar amortización de costos de transacción"

  "325":
    nombre: "Pasivos por Impuestos Diferidos"
    aseveraciones:
      valuacion:
        documentos:
          - "Conciliación tributaria del período completa"
          - "Detalle de diferencias temporarias imponibles"
          - "Cálculo del pasivo por impuesto diferido"
          - "Declaración de impuesto a la renta del período anterior"
        preguntas:
          - "¿Cuáles son las principales diferencias temporarias imponibles?"
          - "¿Se ha verificado el cálculo con un experto tributario?"
          - "¿Existen diferencias permanentes significativas?"
          - "¿Cuál es la tasa de IR aplicable para el diferido?"
        procedimientos:
          - "Verificar identificación de todas las diferencias temporarias"
          - "Recalcular pasivo diferido aplicando tasa vigente"
          - "Revisar consistencia con declaración tributaria"
      integridad:
        documentos:
          - "Movimiento del pasivo diferido durante el período"
          - "Conciliación entre gasto de IR contable vs tributario"
        preguntas:
          - "¿Se han identificado todas las diferencias temporarias?"
          - "¿Existen diferencias de períodos anteriores sin reversar?"
        procedimientos:
          - "Conciliar saldo inicial + cargo/abono del período"
          - "Verificar reversión de diferencias de períodos anteriores"

  "1900":
    nombre: "Gasto Impuesto a la Renta"
    aseveraciones:
      valuacion:
        documentos:
          - "Conciliación tributaria completa del período"
          - "Declaración de impuesto a la renta (Formulario 101)"
          - "Cálculo del anticipo de impuesto a la renta"
          - "Detalle de gastos no deducibles del período"
          - "Detalle de retenciones en la fuente recibidas"
        preguntas:
          - "¿Cuál es la tasa de IR aplicable a esta empresa?"
          - "¿Existen beneficios tributarios o exoneraciones aplicables?"
          - "¿Se ha calculado el anticipo mínimo?"
          - "¿Hay diferencias entre el IR corriente y el diferido?"
        procedimientos:
          - "Verificar conciliación tributaria (utilidad contable → base imponible)"
          - "Recalcular IR corriente sobre base imponible"
          - "Revisar gastos no deducibles más comunes: multas, exceso de nómina"
          - "Conciliar retenciones recibidas vs formulario 103"
      integridad:
        documentos:
          - "Formularios de retenciones en la fuente recibidas (ATS)"
          - "Comprobantes de retención recibidos en el período"
        preguntas:
          - "¿Se han registrado todas las retenciones recibidas?"
          - "¿Existe crédito tributario de períodos anteriores?"
        procedimientos:
          - "Conciliar retenciones contabilizadas vs ATS del SRI"
          - "Verificar aplicación de crédito tributario anterior"
      presentacion:
        documentos:
          - "Notas a los estados financieros sobre impuestos"
          - "Detalle de activo y pasivo diferido revelado"
        preguntas:
          - "¿Se revelan las diferencias temporarias en notas?"
          - "¿La tasa efectiva de IR es consistente con la tasa nominal?"
        procedimientos:
          - "Revisar adecuación de revelaciones de impuestos en EEFF"
          - "Calcular tasa efectiva y compararla con tasa nominal"

  "1600":
    nombre: "Gastos Administrativos"
    aseveraciones:
      integridad:
        documentos:
          - "Detalle de gastos por cuenta y naturaleza"
          - "Roles de pago del período (si incluye nómina)"
          - "Facturas de gastos significativos (arriendos, servicios, honorarios)"
          - "Contratos de servicios recurrentes vigentes"
          - "Detalle de depreciaciones y amortizaciones del período"
        preguntas:
          - "¿Existen gastos del período no contabilizados al cierre?"
          - "¿Se realizaron pagos a partes relacionadas por servicios?"
          - "¿Hay gastos prepagados o diferidos que deban reconocerse?"
          - "¿Existen gastos inusuales o no recurrentes en el período?"
        procedimientos:
          - "Análisis comparativo de gastos vs período anterior y presupuesto"
          - "Prueba de detalle sobre gastos superiores al umbral"
          - "Verificar devengamiento de gastos al cierre"
      valuacion:
        documentos:
          - "Conciliación tributaria (gastos deducibles vs no deducibles)"
          - "Detalle de gastos de representación y su límite deducible"
          - "Soporte de gastos de viaje y movilización"
        preguntas:
          - "¿Los gastos de representación están dentro del límite deducible?"
          - "¿Existen multas o sanciones registradas como gasto?"
          - "¿Hay pagos al exterior sin retención aplicada?"
        procedimientos:
          - "Identificar gastos no deducibles para conciliación tributaria"
          - "Verificar retenciones en la fuente aplicadas a pagos de servicios"
          - "Revisar gastos de gestión vs límite del 2% de ingresos gravados"
      presentacion:
        documentos:
          - "Clasificación de gastos por función o naturaleza"
          - "Detalle de gastos financieros separados de administrativos"
        preguntas:
          - "¿Los gastos financieros están correctamente separados?"
          - "¿Existen reclasificaciones entre gastos operativos y no operativos?"
        procedimientos:
          - "Verificar correcta clasificación entre gastos operativos y financieros"
          - "Revisar presentación de gastos extraordinarios o no recurrentes"
