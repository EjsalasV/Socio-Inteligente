# Afirmaciones de auditoría por área L/S
# Basado en NIAs 315, 330 y 500
# Estructura: codigo_ls -> afirmaciones con descripción y riesgo típico

"140":
  nombre: "Efectivo y Equivalentes a Efectivo"
  afirmaciones:
    - nombre: "Existencia"
      descripcion: "El efectivo registrado existe físicamente o en cuentas bancarias reales."
      riesgo_tipico: "alto"
      procedimiento_clave: "Conciliación bancaria y confirmación directa con bancos."
    - nombre: "Integridad"
      descripcion: "Todo el efectivo disponible está registrado en los libros."
      riesgo_tipico: "medio"
      procedimiento_clave: "Revisión de partidas conciliatorias pendientes."
    - nombre: "Derechos"
      descripcion: "El efectivo pertenece a la entidad y no está pignorado."
      riesgo_tipico: "bajo"
      procedimiento_clave: "Revisión de contratos de crédito y restricciones."
    - nombre: "Presentacion"
      descripcion: "El efectivo está correctamente clasificado y revelado."
      riesgo_tipico: "bajo"
      procedimiento_clave: "Revisión de notas sobre restricciones de efectivo."

"130.1":
  nombre: "Cuentas por Cobrar Corrientes"
  afirmaciones:
    - nombre: "Existencia"
      descripcion: "Las cuentas por cobrar registradas corresponden a derechos reales de cobro."
      riesgo_tipico: "alto"
      procedimiento_clave: "Circularización de clientes significativos."
    - nombre: "Valuacion"
      descripcion: "Las cuentas por cobrar están valuadas al valor neto realizable."
      riesgo_tipico: "alto"
      procedimiento_clave: "Análisis de antigüedad y evaluación de provisión."
    - nombre: "Derechos"
      descripcion: "La entidad tiene derecho legal sobre los montos por cobrar."
      riesgo_tipico: "medio"
      procedimiento_clave: "Revisión de contratos y cesiones de cartera."
    - nombre: "Corte"
      descripcion: "Las cuentas por cobrar corresponden al período correcto."
      riesgo_tipico: "alto"
      procedimiento_clave: "Prueba de corte de ventas y facturación."
    - nombre: "Presentacion"
      descripcion: "Las cuentas por cobrar están correctamente clasificadas."
      riesgo_tipico: "medio"
      procedimiento_clave: "Revisión de saldos con partes relacionadas."

"130.2":
  nombre: "Otras Cuentas por Cobrar"
  afirmaciones:
    - nombre: "Existencia"
      descripcion: "Los saldos registrados corresponden a derechos reales."
      riesgo_tipico: "alto"
      procedimiento_clave: "Confirmación de saldos y análisis de soporte."
    - nombre: "Valuacion"
      descripcion: "Los saldos están valuados apropiadamente."
      riesgo_tipico: "alto"
      procedimiento_clave: "Evaluación de recuperabilidad por antigüedad."
    - nombre: "Derechos"
      descripcion: "La entidad tiene derechos sobre los montos registrados."
      riesgo_tipico: "medio"
      procedimiento_clave: "Revisión de contratos de préstamo y anticipos."
    - nombre: "Presentacion"
      descripcion: "Los saldos están correctamente clasificados."
      riesgo_tipico: "medio"
      procedimiento_clave: "Revisión de naturaleza de saldos y clasificación."

"110":
