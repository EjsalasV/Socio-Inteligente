# Alertas tributarias por área L/S
# Basado en normativa tributaria ecuatoriana (SRI)
# Aplica para encargos bajo marco NIIF y NIIF PYMES en Ecuador

"136":
  nombre: "Activos por Impuestos Corrientes"
  alertas:
    - id: "TRIB-136-01"
      descripcion: "Crédito tributario de IVA acumulado por más de 3 años sin compensación."
      nivel: "alto"
      norma: "LRTI Art. 66"
      accion: "Evaluar caducidad y gestiones de devolución ante el SRI."
    - id: "TRIB-136-02"
      descripcion: "Retenciones en la fuente no utilizadas de períodos anteriores."
      nivel: "medio"
      norma: "RLRTI Art. 94"
      accion: "Verificar declaración de IR y utilización de créditos."
    - id: "TRIB-136-03"
      descripcion: "Crédito tributario mayor al 10% del total de activos."
      nivel: "medio"
      norma: "NIA 315"
      accion: "Evaluar recuperabilidad y posible deterioro del activo."

"1900":
  nombre: "Gasto Impuesto a la Renta"
  alertas:
    - id: "TRIB-IR-01"
      descripcion: "Gastos no deducibles superiores al 5% de los gastos totales."
      nivel: "alto"
      norma: "LRTI Art. 10"
      accion: "Identificar y documentar gastos no deducibles en conciliación."
    - id: "TRIB-IR-02"
      descripcion: "Participación trabajadores no calculada o calculada incorrectamente."
      nivel: "alto"
      norma: "Código del Trabajo Art. 97"
      accion: "Recalcular 15% participación sobre utilidades."
    - id: "TRIB-IR-03"
      descripcion: "Diferencias entre base contable y base fiscal no conciliadas."
      nivel: "alto"
      norma: "NIC 12 / Sección 29 NIIF PYMES"
      accion: "Preparar o revisar conciliación tributaria completa."
    - id: "TRIB-IR-04"
      descripcion: "Impuesto diferido no reconocido cuando existen diferencias temporales."
      nivel: "medio"
      norma: "NIC 12 / Sección 29 NIIF PYMES"
      accion: "Identificar diferencias temporales y calcular impuesto diferido."

"1500":
  nombre: "Ingresos"
  alertas:
    - id: "TRIB-ING-01"
      descripcion: "Ingresos exentos no segregados correctamente en declaración."
      nivel: "alto"
      norma: "LRTI Art. 9"
      accion: "Verificar clasificación de ingresos gravados vs exentos."
    - id: "TRIB-ING-02"
      descripcion: "Diferencias entre ingresos contables e ingresos declarados en IR."
      nivel: "alto"
      norma: "LRTI Art. 8"
      accion: "Conciliar ingresos contables con formulario 101."
    - id: "TRIB-ING-03"
      descripcion: "Ventas sin respaldo de facturación electrónica autorizada."
      nivel: "alto"
      norma: "Reglamento Comprobantes de Venta"
      accion: "Verificar autorización SRI de comprobantes de venta."

"425":
  nombre: "Cuentas por Pagar"
  alertas:
    - id: "TRIB-CXP-01"
      descripcion: "Pagos a proveedores sin retención en la fuente aplicada."
      nivel: "alto"
      norma: "RLRTI Art. 92"
      accion: "Verificar aplicación de retenciones según tabla vigente."
    - id: "TRIB-CXP-02"
      descripcion: "Pagos al exterior sin retención del 25% (o tasa de convenio)."
      nivel: "alto"
      norma: "LRTI Art. 13"
      accion: "Revisar pagos al exterior y retenciones aplicadas."
    - id: "TRIB-CXP-03"
      descripcion: "Cuentas por pagar a partes relacionadas del exterior sin precios de transferencia."
      nivel: "alto"
      norma: "LRTI Art. 15-A"
      accion: "Evaluar obligación de estudio de precios de transferencia."

"425.2":
  nombre: "Otras Cuentas por Pagar"
  alertas:
    - id: "TRIB-OCP-01"
      descripcion: "Préstamos de accionistas o relacionadas sin documentación de tasa de interés."
      nivel: "alto"
      norma: "LRTI Art. 10 num. 2"
      accion: "Verificar que intereses sean a tasa de mercado y estén documentados."
    - id: "TRIB-OCP-02"
      descripcion: "Dividendos anticipados no declarados como ingreso gravable."
      nivel: "alto"
      norma: "LRTI Art. 8 num. 1"
      accion: "Revisar naturaleza de anticipos a accionistas."

"130.1":
  nombre: "Cuentas por Cobrar Corrientes"
  alertas:
    - id: "TRIB-CXC-01"
      descripcion: "Provisión de cuentas incobrables superior al 1% de la cartera."
      nivel: "medio"
      norma: "LRTI Art. 10 num. 11"
      accion: "Verificar cumplimiento del límite legal de deducibilidad."
    - id: "TRIB-CXC-02"
      descripcion: "Castigos de cartera sin cumplir requisitos de deducibilidad."
      nivel: "alto"
      norma: "RLRTI Art. 28 num. 3"
      accion: "Verificar que castigos cumplan requisitos: antigüedad, gestión de cobro."

"14":
  nombre: "Inversiones No Corrientes"
  alertas:
    - id: "TRIB-INV-01"
      descripcion: "Dividendos recibidos de subsidiarias no exentos correctamente tratados."
      nivel: "medio"
      norma: "LRTI Art. 9 num. 1"
      accion: "Verificar exención de dividendos entre sociedades ecuatorianas."
    - id: "TRIB-INV-02"
      descripcion: "Pérdidas en inversiones deducidas sin cumplir requisitos."
      nivel: "alto"
      norma: "LRTI Art. 10"
      accion: "Revisar deducibilidad de pérdidas en inversiones."
    - id: "TRIB-INV-03"
      descripcion: "Inversiones en paraísos fiscales o jurisdicciones de menor imposición."
      nivel: "alto"
      norma: "LRTI Art. 91"
      accion: "Evaluar obligaciones de reporte y retenciones especiales."
