# ====================================================================
# SOCIO AI - UNIFIED CONFIG
# ====================================================================

# Application
app:
  name: "SocioAI"
  version: "1.0.0"
  environment: "auto"
  debug: false

# LLM configuration
llm:
  provider: "deepseek"
  model: "deepseek-chat"
  temperature: 0.3
  max_tokens: 2000
  timeout: 30

llm_models:
  - "deepseek-chat"
  - "deepseek-reasoner"

# Materiality
materialidad:
  benchmarks:
    revenue: 0.05
    profit: 0.10
    assets: 0.05
    equity: 0.01
  minimum_threshold: 100000

# Vector Store (RAG)
vector_store:
  type: "chromadb"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  chunk_size: 1000
  chunk_overlap: 100

# Paths
paths:
  data_root: "data"
  clients: "data/clientes"
  catalogs: "data/catalogos"
  knowledge: "data/conocimiento_normativo"
  expert_criteria: "data/criterio_experto"
  uploads: "data/uploads"
  processed: "data/processed"
  exports: "data/exports"

# Logging
logging:
  level: "INFO"
  format: "json"
  timestamp_format: "%Y-%m-%d %H:%M:%S"
  file: "logs/socio_ai.log"
  max_size: "100MB"
  max_bytes: 10485760
  retention: 30
  backup_count: 5

# Variations
variaciones:
  umbral_absoluto: 1000.0
  umbral_porcentual: 20.0
  umbral_para_porcentaje: 500.0

# Scoring
scoring:
  variacion_absoluta:
    - [100000, 5]
    - [50000, 4]
    - [10000, 3]
    - [1000, 2]
    - [500, 1]

  saldo_actual:
    - [1000000, 5]
    - [500000, 4]
    - [100000, 3]
    - [10000, 2]
    - [1000, 1]

  variacion_porcentual:
    - [100, 5]
    - [50, 4]
    - [20, 3]
    - [10, 2]
    - [1, 1]

# Risks
riesgos:
  materialidad_relativa:
    alto: 0.75
    medio: 0.50
    bajo: 0.25

  cuentas_relevantes:
    alto: 5
    medio: 3

# Validation
validacion:
  tolerancia_cuadre: 5.0
  ano_minimo: 1900
  ano_maximo: 2100

# Format
formato:
  decimales_default: 2
  divisa_default: "USD"

# Audit areas
audit_areas:
  - code: "130"
    name: "Cuentas por Cobrar"
    weight: 0.85
  - code: "140"
    name: "Efectivo"
    weight: 0.9
  - code: "145"
    name: "Impuestos - Activos"
    weight: 0.75
  - code: "170"
    name: "Propiedad e Inversion"
    weight: 0.8
  - code: "200"
    name: "Patrimonio"
    weight: 0.95

# Sectors
sectors:
  - "comerciales"
  - "servicios"
  - "cooperativas"
  - "funerarias"
  - "sin_fines_de_lucro"

# RAG
rag:
  retrieval_method: "similarity"
  top_k: 5
  min_score: 0.6
