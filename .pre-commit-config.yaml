repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: ["--line-length=100"]
        files: ^(app|analysis|backend|core|domain|infra|llm|tests)/.*\.py$

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--extend-ignore=E203,W503"]
        files: ^(app|analysis|backend|core|domain|infra|llm|tests)/.*\.py$

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend-eslint
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
        files: ^frontend/
        stages: [pre-commit]
        require_serial: true

      - id: frontend-types-sync
        name: frontend-types-sync
        entry: npm --prefix frontend run check:types-sync
        language: system
        pass_filenames: false
        files: ^(backend/openapi\.json|frontend/)
        stages: [pre-commit]
        require_serial: true
